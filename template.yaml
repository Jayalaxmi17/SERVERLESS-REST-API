AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CRUD API using Lambda, API Gateway, DynamoDB

Resources:

  MyTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: MyTable
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  CreateItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: create.lambda_handler
      Runtime: python3.9
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: MyTable
      Environment:
        Variables:
          TABLE_NAME: MyTable
      Events:
        CreateApi:
          Type: Api
          Properties:
            Path: /create
            Method: post

  ReadItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: read.lambda_handler
      Runtime: python3.9
      CodeUri: .
      Policies:
        - DynamoDBReadPolicy:
            TableName: MyTable
      Environment:
        Variables:
          TABLE_NAME: MyTable
      Events:
        ReadApi:
          Type: Api
          Properties:
            Path: /read
            Method: get

  UpdateItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: update.lambda_handler
      Runtime: python3.9
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: MyTable
      Environment:
        Variables:
          TABLE_NAME: MyTable
      Events:
        UpdateApi:
          Type: Api
          Properties:
            Path: /update
            Method: put

  DeleteItemFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: delete.lambda_handler
      Runtime: python3.9
      CodeUri: .
      Policies:
        - DynamoDBCrudPolicy:
            TableName: MyTable
      Environment:
        Variables:
          TABLE_NAME: MyTable
      Events:
        DeleteApi:
          Type: Api
          Properties:
            Path: /delete
            Method: delete

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/"